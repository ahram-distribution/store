name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug
        run: |
          set +e
          echo "=== NODE ==="
          node --version
          npm --version
          which node
          echo "=== VITE BIN ==="
          ls -la node_modules/vite/bin/vite.js
          echo "=== RESOLVE ==="
          node -e "try { console.log('vite/bin/vite.js', require.resolve('vite/bin/vite.js')) } catch(e) { console.log('ERR:', e.message) }"
          node -e "try { require('@tailwindcss/vite'); console.log('tailwindcss-vite ok') } catch(e) { console.log('ERR:', e.message) }"
          node -e "try { require('vite'); console.log('vite ok') } catch(e) { console.log('ERR:', e.message) }"
          node -e "try { require('@vitejs/plugin-react'); console.log('react-plugin ok') } catch(e) { console.log('ERR:', e.message) }"
          echo "=== NPM LIST ==="
          npm ls vite 2>&1 || true
          echo "=== TAILWIND OXIDE TEST ==="
          node -e "try { const ox = require('@tailwindcss/oxide'); console.log('oxide keys:', Object.keys(ox)); } catch(e) { console.log('OXIDE ERR:', e.message); }"
          echo "=== VITE DRY-RUN ==="
          node -e "
            const { defineConfig } = require('vite');
            const react = require('@vitejs/plugin-react');
            const tailwindcss = require('@tailwindcss/vite');
            const cfg = defineConfig({ plugins: [react(), tailwindcss()] });
            console.log('config created ok');
          "
          echo "=== DONE ==="

      - name: Build
        id: build
        run: |
          npm run build 2>&1 | tee /tmp/build.log
          exit_code=${PIPESTATUS[0]}
          echo "$exit_code" > /tmp/build_exit_code
          if [ $exit_code -ne 0 ]; then
            echo "::warning::Build failed with exit code $exit_code"
          fi
          exit $exit_code
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Ahram Distribution' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '1.0.0' }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}
          NODE_OPTIONS: "--no-warnings"

      - name: Report build errors
        if: always()
        run: |
          ec=$(cat /tmp/build_exit_code 2>/dev/null || echo "unknown")
          if [ "$ec" = "0" ]; then
            echo "Build succeeded"
            exit 0
          fi
          echo "::warning::Build failed with exit code $ec"
          echo "::group::Last 40 lines of build output"
          tail -40 /tmp/build.log 2>/dev/null || echo "No build.log found"
          echo "::endgroup::"
          echo "::group::Error lines (grep)"
          grep -n -i -E 'error|fail' /tmp/build.log 2>/dev/null || echo "(no error keywords found)"
          echo "::endgroup::"

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp deploy/index.html deploy/404.html
          touch deploy/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to gh-pages branch (SPA fallback)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set Pages source to gh-pages branch
        run: |
          PAYLOAD='{"source":{"branch":"gh-pages","path":"/"}}'
          echo "$PAYLOAD" | gh api -X PUT /repos/${{ github.repository }}/pages --input - 2>&1 || \
            echo "WARNING: Could not set Pages source via API. SPA deep links 404 on first visit. To fix: Settings > Pages > Source > 'Deploy from a branch' > gh-pages / (root)."
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
