name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.vars.outputs.build_id }}
      commit_hash: ${{ steps.vars.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build ID
        id: vars
        run: |
          echo "build_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build
        id: build
        run: |
          npm run build 2>&1 | tee /tmp/build.log
          exit_code=${PIPESTATUS[0]}
          echo "$exit_code" > /tmp/build_exit_code
          if [ $exit_code -ne 0 ]; then
            echo "::warning::Build failed with exit code $exit_code"
          fi
          exit $exit_code
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Ahram Distribution' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '1.0.0' }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}
          BUILD_ID: ${{ steps.vars.outputs.build_id }}
          COMMIT_HASH: ${{ steps.vars.outputs.commit_hash }}
          NODE_OPTIONS: "--no-warnings"

      - name: Report build errors
        if: always()
        run: |
          ec=$(cat /tmp/build_exit_code 2>/dev/null || echo "unknown")
          if [ "$ec" = "0" ]; then
            echo "Build succeeded — build_id: ${{ steps.vars.outputs.build_id }}"
            echo "Manifest:"
            cat dist/build-manifest.json 2>/dev/null || echo "(no manifest)"
            exit 0
          fi
          echo "::warning::Build failed with exit code $ec"
          echo "::group::Last 40 lines of build output"
          tail -40 /tmp/build.log 2>/dev/null || echo "No build.log found"
          echo "::endgroup::"
          echo "::group::Error lines (grep)"
          grep -n -i -E 'error|fail' /tmp/build.log 2>/dev/null || echo "(no error keywords found)"
          echo "::endgroup::"

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cp deploy/index.html deploy/404.html
          touch deploy/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy verification
        run: |
          build_id="${{ needs.build.outputs.build_id }}"
          commit="${{ needs.build.outputs.commit_hash }}"
          echo "=== BUILD INFO ==="
          echo "Build ID:  $build_id"
          echo "Commit:    $commit"
          echo "Deploy URL: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "=== VERIFICATION ==="
          sleep 30
          manifest_url="${{ steps.deployment.outputs.page_url }}build-manifest.json"
          echo "Fetching: $manifest_url"
          http_status=$(curl -s -o /dev/null -w "%{http_code}" "$manifest_url" 2>/dev/null || echo "000")
          if [ "$http_status" = "200" ]; then
            echo "✓ build-manifest.json reachable (HTTP $http_status)"
            echo "Deployed manifest:"
            curl -sS "$manifest_url"
          else
            echo "⚠ build-manifest.json not yet reachable (HTTP $http_status)"
            echo "CDN may still be propagating. Verify manually in 5-10 min."
          fi
