name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://ahram-distribution.github.io/store/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Ahram Distribution' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '1.0.0' }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}

      - name: Prepare deploy directory
        run: |
          ls -la dist/
          mkdir -p deploy
          cp dist/index.html deploy/index.html
          [ -f dist/404.html ] && cp dist/404.html deploy/404.html || cp dist/index.html deploy/404.html
          [ -d dist/assets ] && cp -r dist/assets deploy/
          [ -d dist/pwa ] && cp -r dist/pwa deploy/
          [ -f dist/manifest.webmanifest ] && cp dist/manifest.webmanifest deploy/
          [ -f dist/registerSW.js ] && cp dist/registerSW.js deploy/
          touch deploy/.nojekyll

      - name: Configure Pages to serve from gh-pages branch
        continue-on-error: true
        run: |
          curl -s -X PUT "https://api.github.com/repos/${{ github.repository }}/pages" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
