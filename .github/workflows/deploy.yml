name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      VITE_SUPABASE_URL:
        description: 'Supabase project URL'
        required: false
      VITE_SUPABASE_ANON_KEY:
        description: 'Supabase anon/public key'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] && [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "::error::Missing Supabase configuration."
            echo "::error::One of these GitHub Secrets must be set:"
            echo "::error::  VITE_SUPABASE_URL  (your Supabase project URL)"
            echo "::error::  VITE_SUPABASE_ANON_KEY  (your Supabase anon/public key)"
            echo "::error::"
            echo "::error::To set them: GitHub repo → Settings → Secrets and variables → Actions"
            echo "::error::  → New repository secret"
            echo "::error::Then re-run this workflow."
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'Ahram Distribution' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '1.0.0' }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4