    <title>الأهرام - نظام التوزيع المتكامل</title>
    <script>
      (function() {
        var redirect = sessionStorage.getItem('gh_pages_redirect');
        if (redirect && redirect !== location.pathname + location.search + location.hash) {
          sessionStorage.removeItem('gh_pages_redirect');
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
